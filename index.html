<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instituto Alfonso X - Quake 2 Custom Maps (1999)</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
        }
        #landing {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a0a 70%);
            text-align: center;
            padding: 20px;
        }
        h1 {
            font-size: 2.5em;
            color: #ff6600;
            text-shadow: 0 0 20px rgba(255,102,0,0.5);
            margin-bottom: 10px;
        }
        h2 {
            font-size: 1.2em;
            color: #888;
            margin-bottom: 30px;
            font-weight: normal;
        }
        .maps {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .map-card {
            background: rgba(255,102,0,0.1);
            border: 1px solid #ff6600;
            padding: 15px 25px;
            border-radius: 4px;
        }
        .map-card h3 { color: #ff6600; font-size: 1.1em; }
        .map-card p { color: #999; font-size: 0.85em; margin-top: 5px; }
        #playBtn {
            background: #ff6600;
            color: #000;
            border: none;
            padding: 18px 50px;
            font-size: 1.4em;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            transition: all 0.2s;
            margin-bottom: 15px;
        }
        #playBtn:hover { background: #ff8833; transform: scale(1.05); }
        #playBtn:disabled { background: #555; cursor: wait; }
        #statusText {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 20px;
            min-height: 1.2em;
        }
        .progress-bar {
            width: 300px;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
        }
        .progress-bar .fill {
            height: 100%;
            background: #ff6600;
            width: 0%;
            transition: width 0.3s;
        }
        .credits {
            color: #555;
            font-size: 0.75em;
            margin-top: 20px;
            line-height: 1.6;
        }
        .credits a { color: #777; }

        /* Game view */
        #gameView { display: none; width: 100vw; height: 100vh; }
        canvas { border: 0; outline: none; background: #000; }
        textarea#output {
            font-family: monospace;
            font-size: 14px;
            width: 100%;
            height: 100vh;
            background: #0a0a0a;
            color: #999;
            border: none;
            resize: none;
            display: none;
            outline: none;
            padding: 10px;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
    <div id="landing">
        <h1>INSTITUTO ALFONSO X</h1>
        <h2>3 mapas custom de Quake II &mdash; creados en 1999</h2>
        <div class="maps">
            <div class="map-card">
                <h3>ALFONSOX</h3>
                <p>El instituto</p>
            </div>
            <div class="map-card">
                <h3>ALF2</h3>
                <p>La expansion</p>
            </div>
            <div class="map-card">
                <h3>DISCO</h3>
                <p>La discoteca</p>
            </div>
        </div>
        <button id="playBtn" onclick="startGame()">JUGAR</button>
        <div id="statusText"></div>
        <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
        <div class="credits">
            Mapas y texturas originales de 1999<br>
            Motor: Quake II engine (id Software) via <a href="https://github.com/GMH-Code/Qwasm2" target="_blank">Qwasm2</a><br>
            Requiere descarga de ~37MB (demo shareware de Quake II)
        </div>
    </div>

    <div id="gameView">
        <textarea id="output" readonly></textarea>
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
        <a hidden id="exportFile"></a>
    </div>

    <script>
    var DEMO_URL = 'https://deponie.yamagi.org/quake2/idstuff/q2-314-demo-x86.exe';
    var PAK_PATH_IN_ZIP = 'Install/Data/baseq2/pak0.pak';

    function setStatus(msg) {
        document.getElementById('statusText').textContent = msg;
    }

    function setProgress(pct) {
        var bar = document.getElementById('progressBar');
        var fill = document.getElementById('progressFill');
        bar.style.display = pct > 0 ? 'block' : 'none';
        fill.style.width = pct + '%';
    }

    async function startGame() {
        var btn = document.getElementById('playBtn');
        btn.disabled = true;
        btn.textContent = 'CARGANDO...';

        try {
            setStatus('Descargando Quake II Demo (37MB)...');
            setProgress(5);

            var response = await fetch(DEMO_URL);
            if (!response.ok) throw new Error('Download failed: ' + response.status);

            var reader = response.body.getReader();
            var contentLength = +response.headers.get('Content-Length') || 39000000;
            var received = 0;
            var chunks = [];

            while (true) {
                var result = await reader.read();
                if (result.done) break;
                chunks.push(result.value);
                received += result.value.length;
                var pct = Math.min(70, Math.round((received / contentLength) * 70));
                setProgress(pct);
                setStatus('Descargando... ' + Math.round(received / 1024 / 1024) + ' / ' + Math.round(contentLength / 1024 / 1024) + ' MB');
            }

            var blob = new Blob(chunks);
            setStatus('Extrayendo pak0.pak...');
            setProgress(75);

            var zip = await JSZip.loadAsync(blob);
            var pakFile = zip.file(PAK_PATH_IN_ZIP);
            if (!pakFile) throw new Error('pak0.pak not found in demo');

            var pakData = await pakFile.async('uint8array');
            setStatus('Iniciando Quake II...');
            setProgress(90);

            window._pakData = pakData;

            document.getElementById('landing').style.display = 'none';
            document.getElementById('gameView').style.display = 'block';

            setProgress(95);
            initEngine();

        } catch (err) {
            setStatus('Error: ' + err.message);
            btn.disabled = false;
            btn.textContent = 'REINTENTAR';
            setProgress(0);
        }
    }

    function initEngine() {
        var canvasElement = document.getElementById('canvas');
        var outputElement = document.getElementById('output');
        var exportElement = document.getElementById('exportFile');

        canvasElement.addEventListener('webglcontextlost', function(e) {
            alert('WebGL context lost. Reload the page.');
            e.preventDefault();
        }, false);

        window.Module = {
            _canLockPointer: true,
            print: function(text) {
                if (arguments.length > 1) text = Array.prototype.slice.call(arguments).join(' ');
                console.log(text);
                outputElement.value += text + '\n';
                outputElement.scrollTop = outputElement.scrollHeight;
            },
            canvas: canvasElement,
            setStatus: function(text) {},
            hideConsole: function() {
                outputElement.style.display = 'none';
                canvasElement.style.display = 'block';
                canvasElement.style.width = '100vw';
                canvasElement.style.height = '100vh';
                canvasElement.focus();
            },
            showConsole: function() {
                canvasElement.style.display = 'none';
                outputElement.style.display = 'block';
                outputElement.scrollTop = outputElement.scrollHeight;
                outputElement.focus();
            },
            exportFile: function(path) {
                try {
                    var parts = path.split('/');
                    var data = new Uint8Array(FS.readFile(path));
                    var b = new Blob([data], { type: 'application/octet-stream' });
                    var url = URL.createObjectURL(b);
                    exportElement.href = url;
                    exportElement.download = parts[parts.length - 1];
                    exportElement.click();
                    URL.revokeObjectURL(url);
                } catch (e) { console.error('Export error:', e); }
            },
            winResized: function() {},
            setGamma: function(gamma) {
                gamma = Number(Number(gamma).toFixed(2));
                canvasElement.style.filter = gamma < 0 ? null : 'brightness(' + (2 * gamma) + ')';
            },
            captureMouse: function() {
                if (Module._canLockPointer && !Module._attemptPointerLock()) {
                    Module._canLockPointer = false;
                    document.addEventListener('keydown', Module._lockPointerOnKey);
                }
            },
            _attemptPointerLock: function() {
                if (document.pointerLockElement === null) canvasElement.requestPointerLock();
                return document.pointerLockElement !== null;
            },
            _lockPointerOnKey: function(e) {
                if (e.key === 'Escape' || Module._attemptPointerLock()) {
                    document.removeEventListener('keydown', Module._lockPointerOnKey);
                    Module._canLockPointer = true;
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
            },
            onRuntimeInitialized: function() {
                if (window._pakData) {
                    try {
                        var fd = FS.open('/baseq2/pak0.pak', 'w');
                        FS.write(fd, window._pakData, 0, window._pakData.length, 0);
                        FS.close(fd);
                        console.log('pak0.pak written: ' + window._pakData.length + ' bytes');
                        delete window._pakData;
                    } catch (e) {
                        console.error('Error writing pak0.pak:', e);
                    }
                }
                outputElement.style.display = 'block';
            },
            arguments: ['+set', 'skill', '0', '+map', 'alfonsox']
        };

        var script = document.createElement('script');
        script.src = 'index.js';
        script.async = true;
        document.body.appendChild(script);
    }
    </script>
</body>
</html>
